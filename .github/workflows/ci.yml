name: CI

on:
  push:
    branches: [main, "claude/**", "feat/**", "fix/**"]
  pull_request:
    branches: [main]
  schedule:
    # Weekly live portal regression check — every Monday at 02:00 UTC
    - cron: "0 2 * * 1"

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: ruff lint
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

      - name: mypy
        run: mypy shared/

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests (VCR replay — no live portal calls)
        run: python -m pytest tests/ -v --tb=short
        env:
          # Ensure no accidental live calls slip through in CI
          VCR_RECORD_MODE: none

  # Scheduled weekly run against live portals to catch regressions.
  # Failures here trigger DEGRADED labelling; they do not block PRs.
  openapi:
    name: Export OpenAPI spec
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Export OpenAPI spec
        run: python scripts/export_openapi.py

      - name: Upload openapi.json as artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: docs/openapi.json

  live-portal-check:
    name: Live portal regression check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run live integration tests
        run: python scripts/test_module.py --live
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        continue-on-error: true

      - name: Open DEGRADED issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔴 Live portal regression detected',
              body: `Weekly live check failed on ${new Date().toISOString()}.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['degraded', 'automated']
            })
