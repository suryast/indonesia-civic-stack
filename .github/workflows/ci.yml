name: CI

on:
  push:
    branches: [main, "claude/**", "feat/**", "fix/**"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --locked --extra dev --extra mcp --extra api --extra browser
      - run: uv run ruff check civic_stack/ tests/ scripts/ examples/ app.py server.py
      - run: uv run ruff format --check civic_stack/ tests/ scripts/ examples/ app.py server.py
      - run: uv run mypy civic_stack/

  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - run: uv sync --locked --extra dev --extra mcp --extra browser
      - name: Run tests (VCR replay, skip browser-dependent modules)
        run: |
          uv run pytest tests/ -v --tb=short \
            --ignore=tests/ahu \
            --ignore=tests/bpjph \
            --ignore=tests/oss-nib \
            --ignore=tests/lhkpn
        env:
          VCR_RECORD_MODE: none

  test-browser:
    name: Tests (browser modules)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --locked --extra dev --extra browser
      - run: uv run playwright install chromium --with-deps
      - name: Run browser module tests (lhkpn needs Chromium for reCAPTCHA)
        run: |
          uv run pytest tests/ahu tests/bpjph tests/oss-nib tests/lhkpn -v --tb=short
        env:
          VCR_RECORD_MODE: none
        continue-on-error: true  # Browser tests may fail due to geo-blocking

  openapi:
    name: Export OpenAPI spec
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --locked --extra dev --extra api --extra browser
      - run: uv run python scripts/export_openapi.py
      - uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: docs/openapi.json

  live-portal-check:
    name: Live portal regression check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --locked --extra dev --extra browser
      - name: Run live integration tests
        run: uv run python scripts/test_module.py --live
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        continue-on-error: true
